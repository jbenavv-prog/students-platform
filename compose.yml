services:
  postgres:
    image: postgres:16-alpine
    container_name: students-platform-postgres
    environment:
      POSTGRES_DB: students_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d students_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
