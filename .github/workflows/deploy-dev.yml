name: deploy-dev

on:
  push:
    branches:
      - main
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "Dockerfile"
      - ".dockerignore"
      - "infra/**"
      - ".github/workflows/deploy-dev.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET_REGION: ${{ vars.TF_STATE_BUCKET_REGION || vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME_PLAN: ${{ vars.AWS_ROLE_TO_ASSUME_PLAN || vars.AWS_ROLE_TO_ASSUME }}
      AWS_ROLE_TO_ASSUME_APPLY: ${{ vars.AWS_ROLE_TO_ASSUME_APPLY || vars.AWS_ROLE_TO_ASSUME }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Restore backend solution
        run: dotnet restore StudentsPlatform.sln

      - name: Build backend solution
        run: dotnet build StudentsPlatform.sln --configuration Release --no-restore

      - name: Run domain tests
        run: dotnet test tests/backend/StudentsPlatform.Domain.Tests/StudentsPlatform.Domain.Tests.csproj --configuration Release --no-build

      - name: Run API integration tests
        run: dotnet test tests/backend/StudentsPlatform.Api.IntegrationTests/StudentsPlatform.Api.IntegrationTests.csproj --configuration Release --no-build

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials for plan via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_PLAN }}

      - name: Init shared registry state
        working-directory: infra/shared/ecr
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "shared/ecr/terraform.tfstate"
          region       = "${TF_STATE_BUCKET_REGION}"
          encrypt      = true
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Plan shared registry
        working-directory: infra/shared/ecr
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="aws_region=${AWS_REGION}"
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload shared registry plan
        uses: actions/upload-artifact@v4
        with:
          name: shared-ecr-plan-dev-${{ github.sha }}
          path: infra/shared/ecr/tfplan.txt

      - name: Configure AWS credentials for apply via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_APPLY }}

      - name: Apply shared registry
        working-directory: infra/shared/ecr
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture ECR repository url
        id: registry
        working-directory: infra/shared/ecr
        run: echo "repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REPOSITORY_URL: ${{ steps.registry.outputs.repository_url }}
        run: |
          docker build -t "${REPOSITORY_URL}:${IMAGE_TAG}" .
          docker push "${REPOSITORY_URL}:${IMAGE_TAG}"

      - name: Init live state
        working-directory: infra/live
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "live/dev/terraform.tfstate"
          region       = "${TF_STATE_BUCKET_REGION}"
          encrypt      = true
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Reconfigure AWS credentials for plan via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_PLAN }}

      - name: Plan dev platform and deployment
        working-directory: infra/live
        env:
          REPOSITORY_URL: ${{ steps.registry.outputs.repository_url }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var-file=envs/dev.tfvars \
            -var="aws_region=${AWS_REGION}" \
            -var="container_image=${REPOSITORY_URL}:${IMAGE_TAG}"
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload dev plan
        uses: actions/upload-artifact@v4
        with:
          name: live-dev-plan-${{ github.sha }}
          path: infra/live/tfplan.txt

      - name: Reconfigure AWS credentials for apply via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_APPLY }}

      - name: Apply dev platform and deployment
        working-directory: infra/live
        run: terraform apply -input=false -auto-approve tfplan

      - name: Smoke test
        working-directory: infra/live
        run: |
          ALB_DNS="$(terraform output -raw alb_dns_name)"
          curl --fail --retry 10 --retry-delay 15 "http://${ALB_DNS}/health"

      - name: Capture frontend hosting outputs
        id: frontend
        working-directory: infra/live
        run: |
          echo "bucket_name=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw frontend_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url)" >> "$GITHUB_OUTPUT"

      - name: Publish frontend to S3
        env:
          FRONTEND_BUCKET: ${{ steps.frontend.outputs.bucket_name }}
        run: |
          FRONTEND_DIST="src/frontend/dist/students-platform-web"
          if [ -d "${FRONTEND_DIST}/browser" ]; then
            FRONTEND_DIST="${FRONTEND_DIST}/browser"
          fi
          aws s3 sync "${FRONTEND_DIST}/" "s3://${FRONTEND_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ steps.frontend.outputs.distribution_id }}
        run: aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*"

      - name: Publish deploy summary
        env:
          FRONTEND_URL: ${{ steps.frontend.outputs.frontend_url }}
        run: |
          {
            echo "## Dev deployment"
            echo ""
            echo "Frontend URL: ${FRONTEND_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
