name: infra-plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-validate.yml"
      - ".github/workflows/infra-plan.yml"
      - ".github/workflows/deploy-dev.yml"
      - ".github/workflows/promote-qa.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: infra-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: dev

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME_PLAN: ${{ vars.AWS_ROLE_TO_ASSUME_PLAN || vars.AWS_ROLE_TO_ASSUME }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      PLAN_IMAGE_TAG: pr-${{ github.event.pull_request.number || github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials for plan via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_PLAN }}

      - name: Init shared registry state
        working-directory: infra/shared/ecr
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "shared/ecr/terraform.tfstate"
          region       = "${AWS_REGION}"
          encrypt      = true
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Plan shared registry
        working-directory: infra/shared/ecr
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="aws_region=${AWS_REGION}"
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json

      - name: Capture ECR repository url
        id: registry
        working-directory: infra/shared/ecr
        run: echo "repository_url=$(jq -r '.planned_values.outputs.ecr_repository_url.value' tfplan.json)" >> "$GITHUB_OUTPUT"

      - name: Init dev live state
        working-directory: infra/live
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "live/dev/terraform.tfstate"
          region       = "${AWS_REGION}"
          encrypt      = true
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Plan dev platform
        working-directory: infra/live
        env:
          REPOSITORY_URL: ${{ steps.registry.outputs.repository_url }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var-file=envs/dev.tfvars \
            -var="aws_region=${AWS_REGION}" \
            -var="container_image=${REPOSITORY_URL}:${PLAN_IMAGE_TAG}"
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload shared plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-ecr-plan-pr-${{ github.event.pull_request.number || github.run_number }}
          path: infra/shared/ecr/tfplan.txt

      - name: Upload dev plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-dev-plan-pr-${{ github.event.pull_request.number || github.run_number }}
          path: infra/live/tfplan.txt

      - name: Publish plan summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "<!-- infra-plan-comment -->"
            echo "## Infra plan"
            echo ""
            echo "Workflow run: ${RUN_URL}"
            echo ""
            echo "## Shared ECR plan"
            echo '```terraform'
            sed -n '1,120p' infra/shared/ecr/tfplan.txt
            echo '```'
            echo ""
            echo "## Live dev plan"
            echo '```terraform'
            sed -n '1,160p' infra/live/tfplan.txt
            echo '```'
            echo ""
            echo "Full plan outputs are attached as workflow artifacts."
          } | tee infra-plan-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('infra-plan-summary.md', 'utf8');
            const marker = '<!-- infra-plan-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
