name: promote-qa

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de imagen ya publicada en ECR"
        required: true
        type: string
      activate_service:
        description: "Activa temporalmente la aplicacion en qa"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET_REGION: ${{ vars.TF_STATE_BUCKET_REGION || vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME_PLAN: ${{ vars.AWS_ROLE_TO_ASSUME_PLAN || vars.AWS_ROLE_TO_ASSUME }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Package frontend artifact
        run: tar -czf frontend-dist.tgz -C src/frontend/dist students-platform-web

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials for plan via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_PLAN }}

      - name: Init shared registry state
        working-directory: infra/shared/ecr
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "shared/ecr/terraform.tfstate"
          region       = "${TF_STATE_BUCKET_REGION}"
          encrypt      = true
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Read shared registry outputs
        id: registry
        working-directory: infra/shared/ecr
        run: echo "repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Init qa state
        working-directory: infra/live
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "live/qa/terraform.tfstate"
          region       = "${TF_STATE_BUCKET_REGION}"
          encrypt      = true
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Plan qa platform and deployment
        working-directory: infra/live
        env:
          REPOSITORY_URL: ${{ steps.registry.outputs.repository_url }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var-file=envs/qa.tfvars \
            -var="aws_region=${AWS_REGION}" \
            -var="app_enabled=${{ inputs.activate_service }}" \
            -var="container_image=${REPOSITORY_URL}:${{ inputs.image_tag }}"
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload qa plan
        uses: actions/upload-artifact@v4
        with:
          name: live-qa-plan-${{ inputs.image_tag }}
          path: |
            infra/live/tfplan
            infra/live/tfplan.txt

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-frontend-dist-${{ github.run_id }}
          path: frontend-dist.tgz

      - name: Publish plan summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## Promote qa plan"
            echo ""
            echo "Image tag: ${{ inputs.image_tag }}"
            echo "Activate service: ${{ inputs.activate_service }}"
            echo "Workflow run: ${RUN_URL}"
            echo ""
            echo '```terraform'
            sed -n '1,160p' infra/live/tfplan.txt
            echo '```'
            echo ""
            echo "The binary tfplan and text summary are attached as workflow artifacts."
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: qa

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET_REGION: ${{ vars.TF_STATE_BUCKET_REGION || vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME_APPLY: ${{ vars.AWS_ROLE_TO_ASSUME_APPLY || vars.AWS_ROLE_TO_ASSUME }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials for apply via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_APPLY }}

      - name: Download qa plan
        uses: actions/download-artifact@v4
        with:
          name: live-qa-plan-${{ inputs.image_tag }}
          path: infra/live

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: qa-frontend-dist-${{ github.run_id }}
          path: .

      - name: Extract frontend artifact
        run: |
          mkdir -p src/frontend/dist
          tar -xzf frontend-dist.tgz -C src/frontend/dist

      - name: Init qa state
        working-directory: infra/live
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "live/qa/terraform.tfstate"
          region       = "${TF_STATE_BUCKET_REGION}"
          encrypt      = true
          use_lockfile = true
          EOF
          terraform init -input=false -backend-config=backend.hcl

      - name: Apply qa platform and deployment
        working-directory: infra/live
        run: terraform apply -input=false -auto-approve tfplan

      - name: Smoke test
        if: ${{ inputs.activate_service }}
        working-directory: infra/live
        run: |
          ALB_DNS="$(terraform output -raw alb_dns_name)"
          curl --fail --retry 10 --retry-delay 15 "http://${ALB_DNS}/health"

      - name: Capture frontend hosting outputs
        id: frontend
        working-directory: infra/live
        run: |
          echo "bucket_name=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw frontend_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url)" >> "$GITHUB_OUTPUT"

      - name: Publish frontend to S3
        env:
          FRONTEND_BUCKET: ${{ steps.frontend.outputs.bucket_name }}
        run: |
          FRONTEND_DIST="src/frontend/dist/students-platform-web"
          if [ -d "${FRONTEND_DIST}/browser" ]; then
            FRONTEND_DIST="${FRONTEND_DIST}/browser"
          fi
          aws s3 sync "${FRONTEND_DIST}/" "s3://${FRONTEND_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ steps.frontend.outputs.distribution_id }}
        run: aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*"

      - name: Publish deployment summary
        env:
          FRONTEND_URL: ${{ steps.frontend.outputs.frontend_url }}
        run: |
          {
            echo "## Qa promotion"
            echo ""
            echo "Frontend URL: ${FRONTEND_URL}"
            echo "Activate service: ${{ inputs.activate_service }}"
            echo "Frontend artifact: published from the workflow build output"
          } >> "$GITHUB_STEP_SUMMARY"
