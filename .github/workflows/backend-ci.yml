name: backend-ci

on:
  pull_request:
    paths:
      - "src/backend/**"
      - "tests/backend/**"
      - "StudentsPlatform.sln"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution
        run: dotnet restore StudentsPlatform.sln

      - name: Build solution
        run: dotnet build StudentsPlatform.sln --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test StudentsPlatform.sln --configuration Release --no-build
